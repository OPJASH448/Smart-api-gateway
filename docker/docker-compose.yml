version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - AUTH_SERVICE_URL=http://auth:9001
      - CHAT_SERVICE_URL=http://chat:9002
      - AI_SERVICE_URL=http://ai:9003
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://gateway:gateway_password@postgres:5432/gateway_logs
      - ENVIRONMENT=development
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      chat:
        condition: service_started
      ai:
        condition: service_started
    volumes:
      - ..:/app
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload

  auth:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m services.auth_service.main
    ports:
      - "9001:9001"

  chat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m services.chat_service.main
    ports:
      - "9002:9002"

  ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m services.ai_service.main
    ports:
      - "9003:9003"

volumes:
  postgres_data:
